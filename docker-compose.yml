# ============================================================================
# TunnelVision — Production docker-compose
# ============================================================================

services:
  tunnelvision:
    image: ghcr.io/jasondostal/tunnelvision:latest
    container_name: tunnelvision
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=1
    ports:
      - "8080:8080"   # qBittorrent WebUI
      - "8081:8081"   # TunnelVision API
      # - "8888:8888" # HTTP CONNECT proxy (uncomment if HTTP_PROXY_ENABLED=true)
      # - "1080:1080" # SOCKS5 proxy (uncomment if SOCKS_PROXY_ENABLED=true)
    volumes:
      - ./config:/config
      - ./downloads:/downloads
      # Mount your WireGuard config
      - ./wireguard:/config/wireguard
    environment:
      # --- General ---
      - TZ=America/Chicago
      - PUID=1000
      - PGID=1000

      # --- VPN ---
      - VPN_ENABLED=true
      - VPN_TYPE=auto               # 'auto', 'wireguard', or 'openvpn'
      - VPN_PROVIDER=custom         # 'custom' or 'mullvad'
      - KILLSWITCH_ENABLED=true
      # - VPN_COUNTRY=              # Filter server rotation by country (e.g. 'ch', 'us')
      # - VPN_CITY=                 # Filter server rotation by city (e.g. 'zurich')

      # --- qBittorrent ---
      - WEBUI_PORT=8080
      - WEBUI_ALLOWED_NETWORKS=192.168.0.0/16,172.16.0.0/12,10.0.0.0/8

      # --- API ---
      - API_ENABLED=true
      - API_PORT=8081
      # - API_KEY=your-secret-key   # Uncomment to require authentication

      # --- UI ---
      - UI_ENABLED=true

      # --- MQTT (Home Assistant auto-discovery) ---
      # - MQTT_ENABLED=true
      # - MQTT_BROKER=192.168.1.x   # Your MQTT broker IP
      # - MQTT_PORT=1883
      # - MQTT_USER=
      # - MQTT_PASS=

      # --- Firewall ---
      # - FIREWALL_VPN_INPUT_PORTS=   # Comma-separated ports to accept on VPN interface
      # - FIREWALL_OUTBOUND_SUBNETS=  # CIDRs that bypass VPN (e.g. 192.168.1.0/24)

      # --- DNS ---
      # - DNS_ENABLED=false           # Built-in DNS with DoT, caching, ad-blocking
      # - DNS_UPSTREAM=1.1.1.1,1.0.0.1
      # - DNS_DOT_ENABLED=true
      # - DNS_BLOCK_ADS=false
      # - DNS_BLOCK_MALWARE=false

      # --- ProtonVPN ---
      # - VPN_PROVIDER=proton
      # - PROTON_USER=
      # - PROTON_PASS=                # Or use PROTON_PASS_SECRETFILE for Docker secrets

      # --- HTTP Proxy ---
      # - HTTP_PROXY_ENABLED=false    # HTTP CONNECT proxy for non-Docker clients
      # - HTTP_PROXY_PORT=8888
      # - HTTP_PROXY_USER=
      # - HTTP_PROXY_PASS=

      # --- SOCKS5 Proxy ---
      # - SOCKS_PROXY_ENABLED=false   # SOCKS5 proxy with optional Shadowsocks
      # - SOCKS_PROXY_PORT=1080
      # - SHADOWSOCKS_ENABLED=false
      # - SHADOWSOCKS_CIPHER=aes-256-gcm

      # --- Health ---
      - HEALTH_CHECK_INTERVAL=30

    # networks:
    #   - homelab

# networks:
#   homelab:
#     external: true
