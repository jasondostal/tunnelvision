<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#1a1a2e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <filter id="logoBlur">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="124" fill="#0a0a14"/>
  <circle cx="128" cy="128" r="124" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.3"/>

  <!-- Tunnel rings -->
  <g fill="none" stroke="#F59E0B" transform="translate(128, 128)">
    <ellipse rx="100" ry="100" stroke-width="1" opacity="0.06"/>
    <ellipse rx="80" ry="80" stroke-width="1" opacity="0.08"/>
    <ellipse rx="60" ry="60" stroke-width="1" opacity="0.1"/>
    <ellipse rx="42" ry="42" stroke-width="1.5" opacity="0.15"/>
    <ellipse rx="26" ry="26" stroke-width="1.5" opacity="0.2"/>
  </g>

  <!-- Perspective lines -->
  <g stroke="#F59E0B" stroke-width="0.8" opacity="0.12">
    <line x1="128" y1="4" x2="128" y2="128"/>
    <line x1="128" y1="252" x2="128" y2="128"/>
    <line x1="4" y1="128" x2="128" y2="128"/>
    <line x1="252" y1="128" x2="128" y2="128"/>
    <line x1="40" y1="40" x2="128" y2="128"/>
    <line x1="216" y1="40" x2="128" y2="128"/>
    <line x1="40" y1="216" x2="128" y2="128"/>
    <line x1="216" y1="216" x2="128" y2="128"/>
  </g>

  <!-- Central glow -->
  <circle cx="128" cy="128" r="40" fill="url(#logoGlow)"/>

  <!-- Data particles -->
  <g filter="url(#logoBlur)">
    <circle cx="60" cy="128" r="2.5" fill="#06B6D4" opacity="0.5"/>
    <circle cx="85" cy="120" r="2" fill="#06B6D4" opacity="0.6"/>
    <circle cx="108" cy="126" r="3" fill="#06B6D4" opacity="0.7"/>
    <circle cx="148" cy="130" r="3" fill="#06B6D4" opacity="0.7"/>
    <circle cx="171" cy="136" r="2" fill="#06B6D4" opacity="0.6"/>
    <circle cx="196" cy="128" r="2.5" fill="#06B6D4" opacity="0.5"/>
  </g>

  <!-- Eye / lens center -->
  <g filter="url(#logoBlur)" transform="translate(128, 128)">
    <!-- Eye shape -->
    <path d="M-20,0 Q0,-14 20,0 Q0,14 -20,0Z" fill="none" stroke="#F59E0B" stroke-width="2.5" opacity="0.8"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="8" fill="#F59E0B" opacity="0.85"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="4" fill="#FDE68A"/>
    <!-- Highlight -->
    <circle cx="2" cy="-2" r="1.5" fill="#FFFBEB" opacity="0.9"/>
  </g>

  <!-- Shield accent (security) -->
  <g transform="translate(128, 128)" opacity="0.2">
    <path d="M0,-55 L35,-40 L35,-10 L0,20 L-35,-10 L-35,-40Z" fill="none" stroke="#06B6D4" stroke-width="1.5"/>
  </g>
</svg>
