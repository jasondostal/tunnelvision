name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.
  - type: input
    id: version
    attributes:
      label: TunnelVision Version
      description: "Run `docker inspect` or check the UI footer"
      placeholder: "e.g. 3.5.0"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Deployment Mode
      options:
        - Standalone (built-in VPN)
        - Sidecar (gluetun)
    validations:
      required: true
  - type: dropdown
    id: vpn_provider
    attributes:
      label: VPN Provider
      options:
        - Custom (BYO config)
        - Mullvad
        - IVPN
        - PIA
        - Proton VPN
        - NordVPN
        - Windscribe
        - Surfshark
        - AirVPN
        - ExpressVPN
        - IPVanish
        - TorGuard
        - PrivateVPN
        - Perfect Privacy
        - CyberGhost
        - Other
    validations:
      required: true
  - type: dropdown
    id: vpn_type
    attributes:
      label: VPN Protocol
      options:
        - WireGuard
        - OpenVPN
    validations:
      required: true
  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - amd64
        - arm64
        - arm/v7
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "Run `docker logs tunnelvision 2>&1 | tail -50`"
      render: shell
  - type: textarea
    id: compose
    attributes:
      label: docker-compose.yml (redacted)
      description: Remove passwords and API keys
      render: yaml
