name: Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Gitleaks needs full history

      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install --quiet ruff bandit mypy pip-audit cryptography pydantic -r api/requirements.txt

      - name: Ruff (lint)
        run: ruff check api/

      - name: Bandit (security — high severity)
        run: bandit -r api/ -lll -q

      - name: Mypy (type check)
        run: mypy api/

      - name: ShellCheck
        run: shellcheck rootfs/etc/s6-overlay/scripts/*.sh

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r api/requirements.txt

      - name: Hadolint (Dockerfile best practices)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: npm audit (frontend dependency vulnerabilities)
        working-directory: ui
        run: |
          npm install --no-audit --ignore-scripts
          npm audit --omit=dev || true
          npm audit --audit-level=high

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # cryptography is excluded from requirements.txt (Alpine apk handles it in the container)
        # but the test runner needs it for shadowsocks imports
        run: pip install --quiet pytest pytest-asyncio cryptography -r api/requirements.txt

      - name: Run tests
        run: pytest tests/ -q --tb=short

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # cosign keyless signing via Sigstore OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

      - name: Generate SBOM (Syft)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM with cosign
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

  scan:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      packages: read
      security-events: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy (container image vulnerabilities)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  smoke:
    needs: [build, scan]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      packages: read
      security-events: write  # Nuclei SARIF upload

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start container
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA:0:7}"
          docker run -d \
            --name tunnelvision-smoke \
            -e VPN_ENABLED=false \
            -e QBT_ENABLED=false \
            -p 8081:8081 \
            "$IMAGE"

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8081/api/v1/health > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready within 60s"
          docker logs tunnelvision-smoke
          exit 1

      - name: Assert /health
        run: |
          RESP=$(curl -sf http://localhost:8081/api/v1/health)
          echo "$RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for key in ('healthy', 'vpn', 'killswitch', 'api', 'checked_at'):
              assert key in d, f'Missing key {key!r}: {d}'
          assert d['api'] == 'running', f\"Expected api=running, got: {d['api']}\"
          print('health: OK')
          "

      - name: Assert /system
        run: |
          RESP=$(curl -sf http://localhost:8081/api/v1/system)
          echo "$RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'version' in d, f'Missing version field: {d}'
          print(f\"version {d['version']}: OK\")
          "

      - name: Assert UI is served
        run: |
          curl -sf http://localhost:8081/ > /dev/null
          echo "UI: OK"

      - name: DAST — Nuclei baseline scan
        uses: projectdiscovery/nuclei-action@main
        with:
          target: http://localhost:8081
          flags: "-severity critical,high,medium -tags cve,exposure,misconfig -exclude-tags dos"
          output: nuclei-results.sarif
          sarif-export: nuclei-results.sarif

      - name: Upload Nuclei results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: nuclei-results.sarif
        continue-on-error: true

      - name: Dump logs on failure
        if: failure()
        run: docker logs tunnelvision-smoke

      - name: Cleanup
        if: always()
        run: docker rm -f tunnelvision-smoke || true

  leak-test:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start container with VPN enabled (no tunnel)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA:0:7}"
          # Create a dummy wg0.conf so the container attempts VPN mode
          # Config must be at /config/wireguard/wg0.conf (init-vpn.sh search path)
          mkdir -p /tmp/tv-config/wireguard
          printf '%s\n' \
            '[Interface]' \
            'PrivateKey = AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' \
            'Address = 10.66.66.2/32' \
            'DNS = 10.64.0.1' \
            '' \
            '[Peer]' \
            'PublicKey = BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB=' \
            'Endpoint = 198.51.100.1:51820' \
            'AllowedIPs = 0.0.0.0/0' \
            > /tmp/tv-config/wireguard/wg0.conf

          docker run -d \
            --name tunnelvision-leak \
            --cap-add NET_ADMIN \
            -v /tmp/tv-config:/config \
            -e VPN_ENABLED=true \
            -e QBT_ENABLED=false \
            -e KILLSWITCH_ENABLED=true \
            "$IMAGE"

      - name: Wait for container init
        run: sleep 15

      - name: Verify killswitch blocks external traffic
        run: |
          echo "=== Testing killswitch blocks outbound traffic ==="
          # VPN endpoint is unreachable (dummy IP), so tunnel won't come up.
          # Killswitch nftables rules should block all non-tunnel traffic.

          # Attempt to reach an external IP from inside the container.
          # This MUST fail if the killswitch is working.
          if docker exec tunnelvision-leak wget -q -O /dev/null --timeout=5 http://1.1.1.1 2>/dev/null; then
            echo "FAIL: Traffic leaked outside the tunnel — killswitch did not block!"
            docker exec tunnelvision-leak nft list ruleset || true
            exit 1
          else
            echo "PASS: External traffic blocked by killswitch"
          fi

          # Also verify DNS is blocked (no DNS exfiltration)
          if docker exec tunnelvision-leak nslookup example.com 2>/dev/null; then
            echo "FAIL: DNS query succeeded — killswitch did not block DNS!"
            exit 1
          else
            echo "PASS: DNS queries blocked by killswitch"
          fi

      - name: Verify API still responds locally
        run: |
          # The API should still be reachable on the container's own interface
          if docker exec tunnelvision-leak wget -q -O - http://127.0.0.1:8081/api/v1/health 2>/dev/null | grep -q '"api"'; then
            echo "PASS: API accessible on loopback despite killswitch"
          else
            echo "INFO: API not on loopback (expected if bound to container IP)"
          fi

      - name: Dump logs on failure
        if: failure()
        run: |
          docker logs tunnelvision-leak
          echo "=== nftables ruleset ==="
          docker exec tunnelvision-leak nft list ruleset || true

      - name: Cleanup
        if: always()
        run: docker rm -f tunnelvision-leak || true
