# ============================================================================
# TunnelVision — Homepage Custom API Widgets
# Add these to your Homepage services.yaml
# ============================================================================
#
# Requires the customapi widget: https://gethomepage.dev/widgets/services/customapi/
#
# The /api/v1/vpn/widget endpoint is designed specifically for Homepage.
# It returns flat, human-readable fields — country, city, IP, speeds.
# Works with ANY VPN provider, not just Mullvad.

# --- Recommended: Full status widget ---
# Shows: VPN state, location (city + country), public IP, killswitch status
- TunnelVision:
    icon: mdi-vpn
    href: http://your-host:8081
    description: qBittorrent + WireGuard VPN
    widget:
      type: customapi
      url: http://tunnelvision:8081/api/v1/vpn/widget
      # headers:
      #   X-API-Key: your-api-key    # Uncomment if API_KEY is set
      mappings:
        - field: vpn
          label: VPN
          format: text
        - field: location
          label: Location
          format: text
        - field: ip
          label: IP
          format: text
        - field: killswitch
          label: Killswitch
          format: text

