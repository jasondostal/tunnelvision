# ============================================================================
# TunnelVision — Homepage Widget Examples
# https://gethomepage.dev/widgets/services/customapi/
# ============================================================================
#
# Pick any 4 fields. Mix and match from /api/v1/vpn/status or /api/v1/qbt/status.
# All widgets use the customapi type — no custom widget code needed.

# --- Recommended: VPN status at a glance ---
- TunnelVision:
    icon: /icons/tunnelvision.png   # or mdi-vpn if you don't have the icon
    href: http://your-host:8081
    description: VPN + qBittorrent
    widget:
      type: customapi
      url: http://tunnelvision:8081/api/v1/vpn/status
      # headers:
      #   X-API-Key: your-api-key    # Uncomment if API_KEY is set
      mappings:
        - field: state
          label: VPN
          format: text
        - field: location
          label: Location
          format: text
        - field: public_ip
          label: IP
          format: text
        - field: uptime
          label: Uptime
          format: text

