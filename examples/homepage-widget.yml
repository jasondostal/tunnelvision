# ============================================================================
# TunnelVision — Homepage Custom API Widgets
# Add these to your Homepage services.yaml
# ============================================================================
#
# Requires the customapi widget: https://gethomepage.dev/widgets/services/customapi/
#
# All widgets use /api/v1/vpn/status — the canonical source of truth.
# Country/city/location work with ANY VPN provider via geo-IP services.

# --- Recommended: Full status widget ---
# Shows: VPN state, location (city + country), public IP, killswitch status
- TunnelVision:
    icon: mdi-vpn
    href: http://your-host:8080
    description: qBittorrent + WireGuard VPN
    widget:
      type: customapi
      url: http://tunnelvision:8081/api/v1/vpn/status
      # headers:
      #   X-API-Key: your-api-key    # Uncomment if API_KEY is set
      mappings:
        - field: state
          label: VPN
          format: text
        - field: location
          label: Location
          format: text
        - field: public_ip
          label: IP
          format: text
        - field: killswitch
          label: Killswitch
          format: text

